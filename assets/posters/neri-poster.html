<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NeRI Poster</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f2ed;
      --fg: #171717;
      --muted: #66645f;
      --line: #ddd7ce;
      --surface: #fffdf8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    header {
      display: flex;
      min-height: 58px;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 18px;
      border-bottom: 1px solid var(--line);
      background: color-mix(in srgb, var(--surface) 92%, transparent);
    }

    h1 {
      margin: 0;
      font-size: 1rem;
      line-height: 1.25;
    }

    a {
      color: var(--fg);
      font-size: 0.9rem;
      font-weight: 700;
      text-decoration: none;
    }

    .viewer {
      height: calc(100vh - 58px);
      padding: 14px;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
    }
  </style>
</head>
<body>
  <header>
    <h1>NeRI: Implicit Neural Representation of LiDAR Point Cloud Using Range Image Sequence</h1>
    <a href="../../index.html#publications">Back to Publications</a>
  </header>
  <main class="viewer">
    <iframe src="neri-poster.pdf#toolbar=0&navpanes=0&view=FitH" title="NeRI poster PDF"></iframe>
  </main>
</body>
</html>
